spring.application.name=AcroNexus

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/acronexus
spring.datasource.username=postgres
spring.datasource.password=payal
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
# We use validate because the schema is already created by SQL scripts and we don't want Hibernate to modify it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# API Server Configuration
server.port=8080
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT Configuration
# Note: In production, store this securely (e.g. environment variable). 
# This must be at least 256-bit (32 bytes) Base64 encoded for HS256.
acronexus.app.jwtSecret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Expiration: 24 hours (86400000 ms)
acronexus.app.jwtExpirationMs=86400000
